<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link rel="stylesheet" href="login.css">
</head>
<body>
    <button id="open-btn">로그인창 열기</button>

  <div class="black-bg">
    <div class="white-bg">
      <h4>로그인</h4>
      
      <div class="input-box">
        <input type="text" id="email" placeholder="이메일 입력">
      </div>
      
      <div class="input-box">
        <input type="password" id="password" placeholder="비밀번호 입력">
        <p id="pw-status">비밀번호를 입력하세요.</p>
		<div class="pw-gauge-bg" style="width: 100%; background: #eee; height: 10px; border-radius: 5px; margin-top: 5px;">
    <div class="pw-gauge-bar" style="width: 0%; height: 100%; background: red; transition: all 0.3s; border-radius: 5px;"></div>
  </div>

      <button id="send-btn">로그인</button>
      <button id="send-btn">회원가입</button>
      <button id="close-btn">취소</button>
    </div>
  </div>
    <script src="login.js"></script>
</body>
</html>
